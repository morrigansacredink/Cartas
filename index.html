<script>

function chooseCard(el){

    const name = el.dataset.name;

    if(el.classList.contains("flipped")) return;

    el.classList.add("flipped");

    // 🔁 mostrar carta frontal
    setTimeout(() => {
        el.style.backgroundImage = `url('${name}.png')`;
    }, 300);

    // 🚀 enviar a Fillout
    setTimeout(() => {
        window.location.href =
        "https://build.fillout.com/editor/w962f2mHfTus/edit/jK39?tab=urlParameters&Barajar=https%3A%2F%2Fresplendent-froyo-eee219.netlify.app%2F&account=443757%3Fcarta%3Dmisterio?carta=" +
        encodeURIComponent(name);
    }, 1200);

}

</script>
