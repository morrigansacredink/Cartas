/* carta */
.card{

    transition:0.4s;
    background-image:url("back.png");
    background-size:cover;

}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

.card.flipped{

}

<script>

const container = document.getElementById("container");

// 🔀 barajar REAL cada vez (orden diferente siempre)
function shuffleCards(){

    const cards = Array.from(container.children);

    for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
    }

    cards.forEach(card => {
        container.appendChild(card);

        // 🎴 posición tipo mesa desordenada
        card.style.transform = `
            rotate(${Math.random() * 12 - 6}deg)
            translate(${Math.random() * 25}px, ${Math.random() * 25}px)
        `;
    });
}

// 🚀 barajar al cargar SIEMPRE
window.onload = shuffleCards;

// 🃏 elegir carta
function chooseCard(el){

    const name = el.dataset.name;

    if(el.classList.contains("flipped")) return;

    el.classList.add("flipped");

    // 🖼️ revelar carta
    setTimeout(() => {
        el.style.backgroundImage = `url('${name}.png')`;
    }, 300);

    // ⏱️ esperar 8 segundos
    setTimeout(() => {
        window.location.href =
        "https://TUFORM.fillout.com/t/xxxxx?carta=" +
        encodeURIComponent(name);
    }, 8000);
}

</script>
